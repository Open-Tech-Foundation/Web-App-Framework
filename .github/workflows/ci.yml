name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.changeset/**'
      - '**/CHANGELOG.md'
  pull_request:
    branches: [main]
    branches-ignore:
      - 'changeset-release/**'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test
